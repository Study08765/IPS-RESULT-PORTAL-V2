<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>Admin Login</title>

<style>
body{
font-family:Arial;
background:#f2f5fa;
display:flex;
justify-content:center;
align-items:center;
height:100vh;
margin:0;
}
.box{
background:#fff;
padding:25px;
border-radius:10px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
width:320px;
}
input,button{
width:100%;
padding:12px;
margin-top:12px;
font-size:16px;
box-sizing:border-box;
}
button{
background:#0b3d91;
color:#fff;
border:none;
border-radius:6px;
}
</style>
</head>

<body>

<div class="box">
<h2 align="center">Admin Login</h2>

<input type="password" id="pass" placeholder="Enter Password">

<button onclick="login()">Login</button>
</div>

<script>
function login(){

if(document.getElementById("pass").value==="IPS@2026"){
localStorage.setItem("adminLogin","yes");
location.href="dashboard.html";
}else{
alert("Wrong Password");
}

}
</script>

</body>
</html>
