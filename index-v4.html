<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1.0">

<title>IPS PUBLIC SCHOOL Portal</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b3d91">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#edf4ff;
}

/* HEADER */

.header{

background:linear-gradient(135deg,#062b73,#0b3d91,#1976d2);
padding:35px 20px 90px;
text-align:center;
color:white;
position:relative;
overflow:hidden;

}

.header::before{

content:"";
position:absolute;
width:240px;
height:240px;
background:rgba(255,255,255,.08);
border-radius:50%;
left:-100px;
top:-100px;

}

.header::after{

content:"";
position:absolute;
width:220px;
height:220px;
background:rgba(255,255,255,.08);
border-radius:50%;
right:-80px;
bottom:-80px;

}

.logo{

width:95px;
height:95px;
margin:auto;
background:white;
border-radius:50%;
display:flex;
align-items:center;
justify-content:center;
box-shadow:0 10px 25px rgba(0,0,0,.25);

}

.logo img{

width:82px;
height:82px;
border-radius:50%;

}

.school{

font-size:30px;
font-weight:bold;
margin-top:18px;

}

.place{

margin-top:6px;
letter-spacing:2px;
color:#d6e7ff;

}

.exam{

margin:22px auto 0;
max-width:340px;
background:rgba(255,255,255,.15);
backdrop-filter:blur(8px);
border-radius:18px;
padding:16px;
border:1px solid rgba(255,255,255,.25);

}

#examTitle{

font-size:22px;
color:#FFD54F;

}

#sessionTitle{

margin-top:8px;
font-size:16px;

}

.wave{

position:absolute;
bottom:0;
left:0;
width:100%;
height:60px;
background:#edf4ff;
border-radius:100% 100% 0 0;

}

/* MAIN */

.main{

width:95%;
max-width:520px;
margin:-35px auto 25px;

}

.card{

background:white;
border-radius:22px;
padding:18px;
margin-bottom:18px;
box-shadow:0 10px 25px rgba(0,0,0,.12);

}

</style>

</head>

<body>

<div class="header">

<div class="logo">

<img src="logo.png">

</div>

<div class="school">

IPS PUBLIC SCHOOL

<div class="exam">

Loading...

</h2>

<h3 id="sessionTitle">

Loading...

</h3>

</div>

<div class="wave"></div>

</div>

.noticeBox{
display:none;

color:#ff9800;

.searchTitle{

input{

}

input:focus{
border-color:#1565c0;
}

button{
width:100%;
padding:16px;
border:none;
border-radius:16px;
font-size:18px;
font-weight:bold;
color:white;
cursor:pointer;
background:linear-gradient(135deg,#0b3d91,#1565c0);
box-shadow:0 10px 25px rgba(11,61,145,.25);
}

#result{
margin-top:18px;
line-height:1.8;
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:.4;}
100%{opacity:1;}
}

</style>
