<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Admit Card</title>

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
padding:20px;
}

.box{
max-width:800px;
margin:auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.2);
}

h2{
text-align:center;
color:#0b3d91;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
margin:10px 0;
border:1px solid #ccc;
border-radius:8px;
font-size:16px;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#0b3d91;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

#admitCard{
display:none;
margin-top:30px;
border:2px solid #0b3d91;
padding:20px;
border-radius:10px;
}

</style>

</head>

<body>

<div class="box">

<h2>🎫 Admit Card Management</h2>

<input id="roll" placeholder="Roll Number">

<button id="generateBtn">
Generate Admit Card
</button>

<div id="admitCard">
  <h2 style="text-align:center;color:#0b3d91;">
IPS PUBLIC SCHOOL AHIRORI HARDOI
</h2>

<h3 style="text-align:center;">
ADMIT CARD
</h3>

<hr><br>

<p><b>Student Name :</b>
<span id="showName"></span>
</p>

<p><b>Father Name :</b>
<span id="showFather"></span>
</p>

<p><b>Roll Number :</b>
<span id="showRoll"></span>
</p>

<p><b>Class :</b>
<span id="showClass"></span>
</p>

<p><b>Examination :</b>
<span id="showExam"></span>
</p>

<p><b>Session :</b>
<span id="showSession"></span>
</p>

<h3>Subjects</h3>

<div id="subjectList"></div>

<br><br>

<div style="display:flex;justify-content:space-between;">

<div>
____________________<br>
Student Signature
</div>

<div>
____________________<br>
Principal Signature
</div>

</div>

<br>

<button onclick="window.print()">
🖨️ Print Admit Card
</button>

</div>

</div>

<script type="module" src="admitcard.js"></script>

</body>
  </html>
