<!DOCTYPE html>
<html lang="en">
<head>

<title>My Students</title>

<style>

body{

background:#f4f6fb;
margin:0;

}

.header{
background:#0b3d91;

padding:15px;
text-align:center;
border-radius:10px;
margin-bottom:20px;
}

input{
width:100%;
padding:12px;
font-size:16px;
margin-bottom:15px;

.card{

button{

</head>
