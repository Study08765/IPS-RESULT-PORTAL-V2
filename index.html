<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPS PUBLIC SCHOOL Result Portal</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(135deg,#e8f1ff,#f8fbff);
min-height:100vh;
}

header{
background:linear-gradient(135deg,#0b3d91,#1565c0);
color:white;
text-align:center;
padding:35px 20px;
border-radius:0 0 30px 30px;
box-shadow:0 12px 30px rgba(11,61,145,.35);
}

header img{
width:120px;
margin-bottom:10px;
border-radius:50%;
}

.container{
width:95%;
max-width:650px;
margin:35px auto;
background:#fff;
padding:30px;
border-radius:22px;
box-shadow:0 18px 45px rgba(0,0,0,.15);
}

input{
width:100%;
padding:16px;
font-size:18px;
margin-top:15px;
border:2px solid #dbeafe;
border-radius:12px;
outline:none;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#0b3d91;
color:white;
font-size:18px;
border:none;
cursor:pointer;
border-radius:5px;
}

button:hover{
background:#082d69;
}
.loginBtn{
display:block;
width:95%;
max-width:500px;
margin:18px auto;
padding:16px;
border-radius:16px;
text-align:center;
text-decoration:none;
font-size:19px;
font-weight:700;
letter-spacing:.5px;
color:#fff;
box-shadow:0 10px 25px rgba(0,0,0,.18);
transition:.3s;
}

.loginBtn:hover{
transform:translateY(-4px) scale(1.02);
box-shadow:0 18px 35px rgba(11,61,145,.35);
  }

.student{
background:linear-gradient(135deg,#ff9800,#ff6f00);
}

.staff{
background:linear-gradient(135deg,#16a34a,#0f9d58);
}

.admin{
background:linear-gradient(135deg,#1565c0,#0b3d91);
  }
@keyframes blink{
0%{
opacity:1;
}
50%{
opacity:0.3;
}
100%{
opacity:1;
}
}
#resultLive{
animation: blink 1s infinite;
  }
#result{
margin-top:20px;
line-height:1.8;
}
</style>
<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b3d91">
  <style>
.result-card{
background:#fff;
border-radius:20px;
padding:20px;
box-shadow:0 15px 40px rgba(0,0,0,.15);
border-top:6px solid #0b3d91;
margin-top:20px;
}

.result-header{
text-align:center;
padding-bottom:15px;
border-bottom:2px solid #e5e5e5;
margin-bottom:20px;
}

.result-header h2{
color:#0b3d91;
font-size:30px;
margin:0;
}

.result-header h3{
margin:8px 0;
color:#444;
}

.info-grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
margin:20px 0;
}

.info-box{
background:#f7f9ff;
padding:12px;
border-radius:10px;
font-weight:bold;
border-left:5px solid #0b3d91;
}

.summary{
display:grid;
grid-template-columns:repeat(5,minmax(0,1fr));
gap:8px;
margin-top:20px;
  }

.summary div{
background:linear-gradient(135deg,#0b3d91,#1565c0);
color:#fff;
padding:18px 10px;
border-radius:18px;
text-align:center;
font-weight:bold;
box-shadow:0 10px 25px rgba(11,61,145,.30);
border:1px solid rgba(255,255,255,.2);
transition:.3s;
  cursor:pointer;
    }
    .summary div:hover{
transform:translateY(-6px) scale(1.05);
box-shadow:0 18px 35px rgba(11,61,145,.45);
    }
.summary h3{
font-size:22px;
margin:0;
color:#FFD700;
font-weight:bold;
}

.summary p{
margin-top:8px;
font-size:11px;
color:#eef5ff;
letter-spacing:.5px;
    }
    .pass{
background:linear-gradient(135deg,#00b894,#009688)!important;
}

.fail{
background:linear-gradient(135deg,#e53935,#c62828)!important;
    }
@media(max-width:700px){

.info-grid,
.summary{
grid-template-columns:repeat(5,minmax(0,1fr));
gap:6px;
  }

}
    .resultTable{
width:100%;
border-collapse:collapse;
margin-top:20px;
border-radius:15px;
overflow:hidden;
box-shadow:0 8px 20px rgba(0,0,0,.12);
background:#fff;
}

.resultTable th{
background:linear-gradient(135deg,#0b3d91,#1565c0);
color:#fff;
padding:14px;
font-size:16px;
}

.resultTable td{
padding:14px;
text-align:center;
border-bottom:1px solid #e5e5e5;
}

.resultTable tr:nth-child(even){
background:#f8fbff;
}

.resultTable tr:hover{
background:#eef5ff;
transition:.3s;
    }
  </style>
</head>

<body>

<header>

<h1>IPS PUBLIC SCHOOL</h1>
<h3>AHIRORI HARDOI</h3>

<h2 id="examTitle">Loading...</h2>
<h3 id="sessionTitle">Loading...</h3>


</header>

<div class="container">
<div id="noticeBox"
style="display:none;
background:#fff8e1;
border-left:5px solid orange;
padding:12px;
margin-bottom:15px;
border-radius:8px;">

<h3>📢 School Notice</h3>

<p id="noticeTextShow"></p>

</div>
  <div id="resultLive"
style="display:none;
padding:12px;
margin-bottom:15px;
border-radius:8px;
text-align:center;
font-size:18px;
font-weight:bold;
color:white;">
  </div>
  <div id="countdown"
style="background:#eef6ff;
border-left:5px solid #2196f3;
padding:12px;
margin-bottom:15px;
border-radius:8px;
text-align:center;
font-size:18px;
font-weight:bold;">
⏳ Loading Countdown...
</div>
<h2 align="center">Search Result</h2>

<input
type="text"
id="roll"
placeholder="Enter Roll Number">

<button onclick="searchResult()">

VIEW RESULT

</button>

<div id="result"></div>

</div>
  <a href="student-login.html" class="loginBtn student">
🎓 STUDENT LOGIN
  </a>
  <a href="staff-login.html" class="loginBtn staff">
👨‍🏫 SCHOOL STAFF LOGIN
  </a>
<a href="login.html" class="loginBtn admin">
🔐 ADMIN LOGIN
</a>
  <div style="text-align:center;margin:28px 0 15px;">

<div style="
display:inline-block;
padding:10px 24px;
background:linear-gradient(135deg,#0b3d91,#1565c0);
border-radius:40px;
box-shadow:0 8px 22px rgba(11,61,145,.35);
">

<div style="
font-size:11px;
color:#dbeafe;
letter-spacing:1.5px;
text-transform:uppercase;
">
Designed & Developed By
</div>

<div style="
margin-top:3px;
font-size:17px;
font-weight:700;
font-family:Georgia,serif;
color:#FFD700;
">
A.K. Singh Chandel
</div>

</div>

  </div>
<script type="module" src="app.js"></script>
<script>
if ("serviceWorker" in navigator) {
  navigator.serviceWorker.register("./service-worker.js");
}
</script>
</body>
</html>
