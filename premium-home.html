<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPS PUBLIC SCHOOL - Premium Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#eef4ff;

overflow-x:hidden;

}

.hero{
height:100vh;
min-height:750px;

background:
linear-gradient(rgba(5,25,60,.65),
rgba(5,25,60,.65)),

url("https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=1800&q=80");

background-size:cover;

background-position:center;
position:relative;
overflow:hidden;
display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

}

.hero-content{

max-width:700px;

position:relative;

z-index:2;

}

.logo{

width:110px;

height:110px;

background:rgba(255,255,255,.9);

border-radius:50%;
border:4px solid rgba(255,255,255,.35);
display:flex;

justify-content:center;

align-items:center;

margin:auto;

font-size:45px;

color:#0b3d91;
box-shadow:0 10px 30px rgba(0,0,0,.25);
  backdrop-filter:blur(10px);
}

.hero h1{

color:#fff;
text-shadow:0 0 20px rgba(255,255,255,.5);
font-size:48px;

margin-top:20px;

}

.hero p{

color:#eee;

margin-top:10px;

font-size:18px;

}

.live{

display:inline-block;

margin-top:20px;

background:linear-gradient(135deg,#22c55e,#16a34a);

padding:10px 25px;

color:white;
box-shadow:0 0 25px rgba(34,197,94,.6);
border-radius:50px;

font-weight:600;

}
.search-card{

width:90%;
max-width:520px;

margin:35px auto 0;

padding:28px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(18px);

border-radius:30px;

border:1.5px solid rgba(255,255,255,.55);

box-shadow:0 25px 60px rgba(0,0,0,.35),
0 0 25px rgba(255,255,255,.18);
animation:floatCard 4s ease-in-out infinite;
  transition:0.4s ease;
  transform:translateY(0);
}

.search-title{

color:#fff;
text-shadow:0 0 15px rgba(255,255,255,.5);
font-size:24px;

margin-bottom:20px;

}

.input-box{

width:100%;

padding:16px;
background:rgba(255,255,255,.95);
border:2px solid rgba(255,255,255,.25);

outline:none;

border-radius:15px;

font-size:17px;
box-shadow:0 8px 20px rgba(0,0,0,.08);
margin-bottom:18px;

}
select.input-box{
appearance:none;
-webkit-appearance:none;
background:white;
cursor:pointer;
  }
.result-btn{

width:100%;

padding:16px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:700;

cursor:pointer;

background:linear-gradient(135deg,#0b3d91,#2563eb,#60a5fa);

color:white;
box-shadow:0 12px 30px rgba(37,99,235,.45);
letter-spacing:1.5px;
text-transform:uppercase;
transition:.3s ease;

}

.result-btn:hover{

transform:translateY(-5px) scale(1.03);

box-shadow:0 18px 40px rgba(37,99,235,.60);

}
.hero::after{
content:"";
position:absolute;
left:0;
bottom:0;
width:100%;
height:120px;
background:#eef4ff;
border-radius:100% 100% 0 0;
  }
.search-card:hover{
transform:translateY(-10px);
  }
</style>

</head>

<body>
  <section class="hero">

<div class="hero-content">

<div class="logo">
<i class="fa-solid fa-school"></i>
</div>

<h1>IPS PUBLIC SCHOOL</h1>

<p>AHIRORI • HARDOI</p>
<h2 style="color:#FFD700;margin-top:12px;font-size:28px;">
MONTHLY TEST RESULT 2026-27
</h2>
<div class="live">
🟢 RESULT LIVE
</div>

<div class="search-card">

<h2 class="search-title">
🔍 Search Your Result
</h2>

<select class="input-box">
<option selected disabled>Select Class</option>
<option>Class 3</option>
<option>Class 4</option>
<option>Class 5</option>
<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>
</select>

<input
type="number"
class="input-box"
placeholder="Enter Roll Number">

<button class="result-btn">
🔍 VIEW RESULT
</button>

</div>

</div>

  </section>
