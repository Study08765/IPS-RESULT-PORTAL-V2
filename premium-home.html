<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPS PUBLIC SCHOOL - Premium Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#eef4ff;

overflow-x:hidden;

}

.hero{

height:650px;

background:
linear-gradient(rgba(5,25,60,.65),
rgba(5,25,60,.65)),

url("https://images.unsplash.com/photo-1523050854058-8df90110c9f1?auto=format&fit=crop&w=1600&q=80");

background-size:cover;

background-position:center;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

}

.hero-content{

max-width:700px;

}

.logo{

width:110px;

height:110px;

background:#fff;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

margin:auto;

font-size:45px;

color:#0b3d91;

}

.hero h1{

color:#fff;

font-size:42px;

margin-top:20px;

}

.hero p{

color:#eee;

margin-top:10px;

font-size:18px;

}

.live{

display:inline-block;

margin-top:20px;

background:#16a34a;

padding:10px 25px;

color:white;

border-radius:50px;

font-weight:600;

}
.search-card{

width:90%;
max-width:520px;

margin:35px auto 0;

padding:28px;

background:rgba(255,255,255,.18);

backdrop-filter:blur(18px);

border-radius:25px;

border:1px solid rgba(255,255,255,.25);

box-shadow:0 20px 40px rgba(0,0,0,.25);

}

.search-title{

color:#fff;

font-size:24px;

margin-bottom:20px;

}

.input-box{

width:100%;

padding:16px;

border:none;

outline:none;

border-radius:15px;

font-size:17px;

margin-bottom:18px;

}

.result-btn{

width:100%;

padding:16px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:700;

cursor:pointer;

background:linear-gradient(135deg,#ffb100,#ff7300);

color:white;

transition:.3s;

}

.result-btn:hover{

transform:scale(1.03);

  }
</style>

</head>

<body>
  <section class="hero">

<div class="hero-content">

<div class="logo">
<i class="fa-solid fa-school"></i>
</div>

<h1>IPS PUBLIC SCHOOL</h1>

<p>AHIRORI • HARDOI</p>

<div class="live">
🟢 RESULT LIVE
</div>

<div class="search-card">

<h2 class="search-title">
🔍 Search Your Result
</h2>

<input
type="text"
placeholder="Enter Roll Number"
class="input-box">

<button class="result-btn">
VIEW RESULT →
</button>

</div>

</div>

  </section>
