<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPS PUBLIC SCHOOL - Premium Portal</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700;800&display=swap" rel="stylesheet">

<link rel="stylesheet"
href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.6.0/css/all.min.css">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{

background:#eef4ff;

overflow-x:hidden;

}

.hero{

height:700px;

background:
linear-gradient(rgba(5,25,60,.65),
rgba(5,25,60,.65)),

url("https://images.unsplash.com/photo-1509062522246-3755977927d7?auto=format&fit=crop&w=1800&q=80");

background-size:cover;

background-position:center;

display:flex;

justify-content:center;

align-items:center;

text-align:center;

padding:20px;

}

.hero-content{

max-width:700px;

position:relative;

z-index:2;

}

.logo{

width:110px;

height:110px;

background:#fff;

border-radius:50%;

display:flex;

justify-content:center;

align-items:center;

margin:auto;

font-size:45px;

color:#0b3d91;

}

.hero h1{

color:#fff;

font-size:42px;

margin-top:20px;

}

.hero p{

color:#eee;

margin-top:10px;

font-size:18px;

}

.live{

display:inline-block;

margin-top:20px;

background:#16a34a;

padding:10px 25px;

color:white;

border-radius:50px;

font-weight:600;

}
.search-card{

width:90%;
max-width:520px;

margin:35px auto 0;

padding:28px;

background:rgba(255,255,255,.12);

backdrop-filter:blur(18px);

border-radius:25px;

border:1px solid rgba(255,255,255,.35);

box-shadow:0 25px 60px rgba(0,0,0,.35);
animation:floatCard 4s ease-in-out infinite;
}

.search-title{

color:#fff;

font-size:24px;

margin-bottom:20px;

}

.input-box{

width:100%;

padding:16px;

border:none;

outline:none;

border-radius:15px;

font-size:17px;

margin-bottom:18px;

}
select.input-box{
appearance:none;
-webkit-appearance:none;
background:white;
cursor:pointer;
  }
.result-btn{

width:100%;

padding:16px;

border:none;

border-radius:15px;

font-size:18px;

font-weight:700;

cursor:pointer;

background:linear-gradient(135deg,#0b3d91,#2563eb);

color:white;
box-shadow:0 12px 30px rgba(37,99,235,.45);
letter-spacing:1px;
transition:.3s;

}

.result-btn:hover{

transform:translateY(-5px) scale(1.03);

box-shadow:0 18px 40px rgba(37,99,235,.60);

}
</style>

</head>

<body>
  <section class="hero">

<div class="hero-content">

<div class="logo">
<i class="fa-solid fa-school"></i>
</div>

<h1>IPS PUBLIC SCHOOL</h1>

<p>AHIRORI • HARDOI</p>

<div class="live">
🟢 RESULT LIVE
</div>

<div class="search-card">

<h2 class="search-title">
🔍 Search Your Result
</h2>

<select class="input-box">
<option selected disabled>Select Class</option>
<option>Class 3</option>
<option>Class 4</option>
<option>Class 5</option>
<option>Class 6</option>
<option>Class 7</option>
<option>Class 8</option>
</select>

<input
type="number"
class="input-box"
placeholder="Enter Roll Number">

<button class="result-btn">
🔍 VIEW RESULT
</button>

</div>

</div>

  </section>
