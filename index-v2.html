<!DOCTYPE html>
<html lang="en">
<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>IPS PUBLIC SCHOOL Result Portal</title>

<link rel="manifest" href="manifest.json">
<meta name="theme-color" content="#0b3d91">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:linear-gradient(180deg,#edf4ff,#f8fbff);
min-height:100vh;
}

header{
background:linear-gradient(135deg,#0b3d91,#1565c0);
color:#fff;
text-align:center;
padding:30px 20px 40px;
border-bottom-left-radius:28px;
border-bottom-right-radius:28px;
box-shadow:0 12px 30px rgba(0,0,0,.18);
}

header img{
width:90px;
height:90px;
border-radius:50%;
background:#fff;
padding:4px;
margin-bottom:10px;
}

header h1{
font-size:30px;
font-weight:bold;
letter-spacing:1px;
}

header h3{
margin-top:5px;
font-weight:500;
}

#examTitle{
margin-top:15px;
font-size:24px;
color:#FFD54F;
}

#sessionTitle{
margin-top:8px;
font-size:18px;
}

.wrapper{
width:95%;
max-width:520px;
margin:-20px auto 30px;
}

.card{
background:#fff;
border-radius:20px;
padding:18px;
margin-top:18px;
box-shadow:0 10px 25px rgba(0,0,0,.12);
}

.noticeCard{
display:none;
background:#fffdf4;
border-left:6px solid orange;
}

.noticeCard h3{
color:#ff9800;
margin-bottom:10px;
}

.liveCard{
display:none;
text-align:center;
font-size:18px;
font-weight:bold;
color:#fff;
}

.countCard{
background:#eef6ff;
border-left:6px solid #2196f3;
text-align:center;
font-size:18px;
font-weight:bold;
}

.searchTitle{
text-align:center;
color:#0b3d91;
margin-bottom:18px;
}

input{
width:100%;
padding:15px;
font-size:18px;
border:2px solid #dbe7ff;
border-radius:14px;
outline:none;
transition:.3s;
}

input:focus{
border-color:#1565c0;
}

button{
width:100%;
padding:15px;
margin-top:18px;
border:none;
border-radius:14px;
background:linear-gradient(135deg,#0b3d91,#1565c0);
color:#fff;
font-size:18px;
font-weight:bold;
cursor:pointer;
transition:.3s;
}

button:hover{
transform:translateY(-2px);
}

#result{
margin-top:20px;
line-height:1.8;
}

.loginBtn{
display:block;
width:100%;
padding:16px;
margin-top:15px;
border-radius:16px;
text-decoration:none;
text-align:center;
font-size:18px;
font-weight:bold;
color:#fff;
box-shadow:0 10px 25px rgba(0,0,0,.18);
transition:.3s;
}

.loginBtn:hover{
transform:translateY(-4px);
}

.student{
background:linear-gradient(135deg,#ff9800,#ff6f00);
}

.staff{
background:linear-gradient(135deg,#16a34a,#0f9d58);
}

.admin{
background:linear-gradient(135deg,#1565c0,#0b3d91);
}

@keyframes blink{
0%{opacity:1;}
50%{opacity:.4;}
100%{opacity:1;}
}

#resultLive{
animation:blink 1s infinite;
}

footer{
text-align:center;
padding:25px;
color:#666;
font-size:14px;
}

</style>

</head>

<body>

<header>

<!--
<img src="logo.png">
-->

<h1>IPS PUBLIC SCHOOL</h1>

<h3>AHIRORI HARDOI</h3>

<h2 id="examTitle">Loading...</h2>

<h3 id="sessionTitle">Loading...</h3>

</header>

<div class="wrapper">
  <div id="noticeBox" class="card noticeCard">

<h3>📢 School Notice</h3>

<p id="noticeTextShow"></p>

</div>

<div id="resultLive" class="card liveCard">

</div>

<div id="countdown" class="card countCard">

⏳ Loading Countdown...

</div>

<div class="card">

<h2 class="searchTitle">

Search Result

</h2>

<input
type="text"
id="roll"
placeholder="Enter Roll Number">

<button onclick="searchResult()">

VIEW RESULT

</button>

<div id="result"></div>

</div>
<div class="card">

<h2 class="searchTitle">Login Portal</h2>

<a href="student-login.html" class="loginBtn student">
🎓 STUDENT LOGIN
</a>

<a href="staff-login.html" class="loginBtn staff">
👨‍🏫 SCHOOL STAFF LOGIN
</a>

<a href="login.html" class="loginBtn admin">
🔐 ADMIN LOGIN
</a>

</div>

<footer>

<p style="font-size:13px;">Designed & Developed By</p>

<h2 style="margin-top:6px;color:#0b3d91;">
A.K. Singh Chandel
</h2>

<p style="margin-top:8px;">
© 2026 IPS PUBLIC SCHOOL AHIRORI HARDOI
</p>

</footer>

</div>

<script type="module" src="app.js"></script>

<script>
if("serviceWorker" in navigator){
navigator.serviceWorker.register("./service-worker.js");
}
</script>

</body>
  </html>
