<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Result Entry</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6fb;
}

.header{
background:#0b3d91;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:900px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

input{
width:100%;
padding:12px;
margin:8px 0;
border:1px solid #ccc;
border-radius:8px;
box-sizing:border-box;
}

.grid{
display:grid;
grid-template-columns:repeat(2,1fr);
gap:12px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#0b3d91;
color:white;
border:none;
border-radius:8px;
font-size:17px;
cursor:pointer;
}

button:hover{
background:#062c69;
}
</style>
</head>

<body>

<div class="header">
📝 Result Entry
</div>

<div class="container">

<input id="admission" placeholder="Admission Number">

<input id="name" placeholder="Student Name" readonly>
<input id="father" placeholder="Father Name" readonly>

<input id="class" placeholder="Class" readonly>

<input id="roll" placeholder="Roll Number" readonly>

<select id="examType">
<option>Quarterly Examination</option>
<option>Half Yearly Examination</option>
<option>Annual Examination</option>
</select>

<input id="session" value="2026-27">
<div class="grid">

<div id="subjects">

<div class="subjectRow">

<input class="subjectName" placeholder="Subject Name">

<input class="fullMarks" type="number" placeholder="Full Marks" value="100">

<input class="obtainedMarks" type="number" placeholder="Obtained Marks">

</div>

</div>

<button type="button" id="addSubject">
➕ Add Subject
</button>

</div>
<hr>

<h3>Result Summary</h3>

<input id="total" placeholder="Total Marks" readonly>

<input id="percentage" placeholder="Percentage" readonly>

<input id="grade" placeholder="Grade" readonly>

<input id="result" placeholder="PASS / FAIL" readonly>
<button id="saveBtn">
💾 Save Result
</button>

</div>

<script type="module" src="result-entry.js"></script>

</body>
  </html>
