<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPS Student Dashboard V2</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(rgba(4,25,70,.45),rgba(4,25,70,.60)),
    url("images/village-background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.header{
    width:100%;
    padding:18px;
    text-align:center;
    background:linear-gradient(90deg,#003b8e,#0066ff);
    color:#fff;
    box-shadow:0 6px 20px rgba(0,0,0,.30);
}

.header h1{
    font-size:28px;
    font-weight:700;
}

.header p{
    margin-top:6px;
    font-size:15px;
    letter-spacing:2px;
  }
  .container{
    width:100%;
    padding:30px 20px;
}

.profile-card{
    width:100%;
    max-width:520px;
    margin:30px auto;
    padding:30px;

    background:rgba(255,255,255,.18);
    backdrop-filter:blur(18px);

    border-radius:25px;

    border:1px solid rgba(255,255,255,.25);

    text-align:center;

    box-shadow:0 15px 40px rgba(0,0,0,.35);
}

.school-logo{
    width:120px;
    height:120px;
    margin:auto;

    background:#fff;

    border-radius:50%;

    border:5px solid gold;

    overflow:hidden;
}

.school-logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.student-name{
    color:#fff;
    font-size:28px;
    font-weight:700;
    margin-top:18px;
}

.student-class{
    color:#fff;
    opacity:.9;
    margin-top:8px;
  }
    .info-card{
margin-top:25px;
}

.row{
display:flex;
justify-content:space-between;
align-items:center;
padding:14px 18px;
margin-bottom:12px;
background:rgba(255,255,255,.12);
border-radius:14px;
color:#fff;
font-size:17px;
}

.row b{
color:#FFD700;
    }
    .button-grid{
    max-width:520px;
    margin:25px auto;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:15px;
}

.btn{
    display:flex;
    justify-content:center;
    align-items:center;
    text-decoration:none;
    color:#fff;
    font-size:18px;
    font-weight:600;
    padding:18px;
    border-radius:18px;
    background:linear-gradient(135deg,#0b3d91,#1976ff);
    box-shadow:0 10px 25px rgba(0,0,0,.35);
    transition:.3s;
}

.btn:hover{
    transform:translateY(-4px);
}

.logout{
    grid-column:1/3;
    background:linear-gradient(135deg,#c62828,#ff5252);
}
</style>

</head>

<body>
<div class="header">
    <h1>🎓 IPS PUBLIC SCHOOL</h1>
    <p>STUDENT DASHBOARD</p>
</div>

<div class="container">

    <div class="profile-card">

        <div class="school-logo">
            <img src="images/logo.png" alt="School Logo">
        </div>

        <h2 class="student-name" id="name">
            Student Name
        </h2>
<div class="info-card">

<div class="row">
<span>👨 Father</span>
<b id="father">Father Name</b>
</div>

<div class="row">
<span>🎓 Class</span>
<b id="class">7</b>
</div>

<div class="row">
<span>🎫 Roll No</span>
<b id="roll">2026</b>
</div>

</div>

</div>
    <div class="button-grid">

<a class="btn" href="student-homework.html">📚 Homework</a>

<a class="btn" href="student-timetable.html">📅 Time Table</a>

<a class="btn" href="student-admitcard.html">🎫 Admit Card</a>

<a class="btn" href="index.html">📊 Result</a>

<a class="btn logout" href="student-login.html">🚪 Logout</a>

    </div>
</body>

</html>
