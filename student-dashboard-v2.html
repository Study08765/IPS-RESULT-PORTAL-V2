<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPS Student Dashboard V2</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(rgba(4,25,70,.45),rgba(4,25,70,.60)),
    url("images/village-background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.header{
    width:100%;
    padding:18px;
    text-align:center;
    background:linear-gradient(90deg,#003b8e,#0066ff);
    color:#fff;
    box-shadow:0 6px 20px rgba(0,0,0,.30);
}

.header h1{
    font-size:28px;
    font-weight:700;
}

.header p{
    margin-top:6px;
    font-size:15px;
    letter-spacing:2px;
  }
.container{
    width:100%;
    max-width:100%;
    padding:15px;
}

.profile-card{
    width:100%;
    padding:30px 22px;
    margin:20px 0;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,.22),
        rgba(255,255,255,.08)
    );

    backdrop-filter:blur(25px);

    border:1.5px solid rgba(255,255,255,.28);
    border-radius:30px;

    box-shadow:
        0 15px 40px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.30);

    transition:.3s;
}

.profile-card:hover{
    transform:translateY(-4px);
    box-shadow:
        0 20px 50px rgba(0,0,0,.40),
        inset 0 1px 0 rgba(255,255,255,.35);
}

.school-logo{
    width:130px;
    height:130px;
    margin:0 auto 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
    border:5px solid #FFD700;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 25px rgba(255,215,0,.6);
    }

.school-logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.student-name{
    color:#fff;
    font-size:32px;
    font-weight:800;
    margin:18px 0;
    text-align:center;
    text-shadow:0 4px 12px rgba(0,0,0,.45);
}

.student-class{
    color:#fff;
    opacity:.9;
    margin-top:8px;
  }
    .info-card{
    display:grid;
    gap:18px;
    margin-top:28px;
    }

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 22px;
    margin-bottom:16px;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,.22),
        rgba(255,255,255,.10)
    );

    border:1.5px solid rgba(255,255,255,.30);
    border-radius:18px;

    backdrop-filter:blur(15px);

    box-shadow:
        0 8px 20px rgba(0,0,0,.25),
        inset 0 1px 0 rgba(255,255,255,.35);

    transition:.3s;
}

.row:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(0,0,0,.35);
}

.row span{
    color:#ffffff;
    font-size:17px;
    font-weight:600;
}

.row b{
    color:#FFD700;
    font-size:18px;
    font-weight:700;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;

    height:72px;
    padding:0 20px;

    border-radius:22px;
    text-decoration:none;

    font-size:20px;
    font-weight:700;
    color:#fff;

    background:linear-gradient(135deg,#1e6bff,#003fbd);

    border:1.5px solid rgba(255,255,255,.25);

    box-shadow:
        0 10px 25px rgba(0,0,0,.35),
        inset 0 2px 3px rgba(255,255,255,.30);

    transition:.35s ease;
}

.btn:hover{
    transform:translateY(-5px) scale(1.03);

    box-shadow:
        0 18px 35px rgba(0,0,0,.45),
        0 0 18px rgba(30,107,255,.45);
}

.btn:active{
    transform:scale(.98);
    }

.logout{
    grid-column:1/3;

    height:74px;

    background:linear-gradient(135deg,#ff4d4d,#d60000);

    font-size:21px;
    font-weight:800;

    border-radius:22px;
    }
    .button-grid{
    width:100%;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:22px;
    margin-top:30px;
    }
    .success-card{
    margin-top:35px;
    padding:25px;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,.22),
        rgba(255,255,255,.08)
    );

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.25);

    border-radius:28px;

    box-shadow:
    0 15px 35px rgba(0,0,0,.35);

    text-align:center;
}

.success-card h2{
    color:#FFD700;
    font-size:24px;
    margin-bottom:18px;
    font-weight:800;
}

#successQuote{
    color:#fff;
    font-size:20px;
    line-height:1.8;
    font-weight:600;
    white-space:pre-line;
}

.quote-author{
    margin-top:18px;
    color:#FFD700;
    font-size:16px;
    font-style:italic;
    font-weight:700;
    letter-spacing:1px;
        }
    .time-card{
    margin-top:30px;
    padding:25px;
    text-align:center;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,.22),
        rgba(255,255,255,.08)
    );

    backdrop-filter:blur(20px);

    border:1px solid rgba(255,255,255,.25);

    border-radius:28px;

    box-shadow:0 15px 35px rgba(0,0,0,.35);
}

.time-card h2{
    color:#FFD700;
    font-size:24px;
    margin-bottom:15px;
}

#liveDate{
    color:#ffffff;
    font-size:18px;
    font-weight:600;
    margin-bottom:10px;
}

#liveClock{
    color:#FFD700;
    font-size:34px;
    font-weight:800;
    letter-spacing:2px;
    }
</style>

</head>

<body>
<div class="header">
    <h1>🎓 IPS PUBLIC SCHOOL</h1>
    <p>STUDENT DASHBOARD</p>
</div>

<div class="container">

    <div class="profile-card">

        <div class="school-logo">
        <img src="logo.png" id="schoolLogo" alt="IPS Logo">
        </div>

        <h2 class="student-name" id="name">
            Student Name
        </h2>
<div class="info-card">

<div class="row">
<span>👨 Father</span>
<b id="father">Father Name</b>
</div>

<div class="row">
<span>🎓 Class</span>
<b id="class">7</b>
</div>

<div class="row">
<span>🎫 Roll No</span>
<b id="roll">2026</b>
</div>

</div>

</div>
    <div class="button-grid">

<a class="btn" href="student-homework.html">📚 Homework</a>

<a class="btn" href="student-timetable.html">📅 Time Table</a>

<a class="btn" href="student-admitcard.html">🎫 Admit Card</a>

<a class="btn" href="index.html">📊 Result</a>

<a class="btn logout" href="student-login.html">🚪 Logout</a>

    </div>
    <div class="time-card">

    <h2>📅 Today</h2>

    <div id="liveDate"></div>

    <div id="liveClock"></div>

    </div>
<div class="success-card">

    <h2>🌟 Today's Success Quote</h2>

    <p id="successQuote"></p>

    <p class="quote-author">
        — By A.K. SINGH CHANDEL
    </p>

</div>
    <script>
const quotes = [
"Success begins with self-belief.\nKeep moving forward every day.",
"Dream big and work hard.\nYour future depends on today's effort.",
"Every small step matters.\nKeep learning and never stop growing.",
"Discipline creates success.\nConsistency builds your future.",
"Believe in yourself.\nYou are stronger than you think.",
"Today's effort is tomorrow's success.\nNever give up on your dreams.",
"Learn with passion.\nLead with confidence.",
"Hard work beats talent.\nWhen talent doesn't work hard.",
"Your attitude shapes your future.\nStay positive and keep smiling.",
"Success is earned, not given.\nWork for it every single day.",
"Great things take time.\nBe patient and stay focused.",
"Every challenge is a lesson.\nEvery lesson makes you stronger.",
"Knowledge is your greatest power.\nUse it wisely every day.",
"Stay humble and keep learning.\nSuccess will follow you.",
"Don't wait for opportunities.\nCreate them with hard work.",
"The best investment is education.\nIt never loses its value.",
"Small efforts every day.\nLead to big achievements tomorrow.",
"Confidence is the key to success.\nBelieve and achieve.",
"Never stop improving yourself.\nThe best is yet to come.",
"Success starts today.\nMake every moment count."
];

const day = Math.floor(Date.now() / 86400000);
document.getElementById("successQuote").innerText =
quotes[day % quotes.length];
        function updateClock(){

    const now = new Date();

    const dateOptions = {
        weekday: "long",
        day: "numeric",
        month: "long",
        year: "numeric"
    };

    document.getElementById("liveDate").innerHTML =
        now.toLocaleDateString("en-IN", dateOptions);

    document.getElementById("liveClock").innerHTML =
        now.toLocaleTimeString("en-IN");
}

updateClock();
setInterval(updateClock,1000);
    </script>
</body>

</html>
