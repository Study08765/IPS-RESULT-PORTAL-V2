<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPS Student Dashboard V2</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(rgba(4,25,70,.20), rgba(4,25,70,.25)),
    url("village-bg.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.header{
    width:100%;
    padding:18px;
    text-align:center;
    background:linear-gradient(90deg,#003b8e,#0066ff);
    color:#fff;
    box-shadow:0 6px 20px rgba(0,0,0,.30);
}

.header h1{
    font-size:28px;
    font-weight:700;
}

.header p{
    margin-top:6px;
    font-size:15px;
    letter-spacing:2px;
  }
.container{
    width:100%;
    max-width:100%;
    padding:15px;
}

.profile-card{
    width:100%;
    padding:30px 22px;
    margin:20px 0;

    background:transparent; /* Grey हट गया */

    backdrop-filter:none;   /* Blur हट गया */

    border:none;

    border-radius:30px;

    box-shadow:none;
}

.school-logo{
    width:130px;
    height:130px;
    margin:0 auto 8px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
    border:5px solid #FFD700;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 25px rgba(255,215,0,.6);
    }

.school-logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.student-name{
    text-align:center;
    font-size:42px;
    font-weight:800;
    color:#fff;
    margin-top:5px;
    margin-bottom:15px;
    text-shadow:0 4px 12px rgba(0,0,0,.6);
}

.student-class{
    color:#fff;
    opacity:.9;
    margin-top:8px;
  }
    .info-card{
    display:grid;
    gap:18px;
    margin-top:28px;
    }

.row{
    width:70%;
    margin:8px auto;
    display:flex;
    justify-content:space-between;
    align-items:center;
    padding:12px 18px;
    background:#1b8f3a;
    border-radius:12px;
}

.row:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(0,0,0,.35);
}

.row span{
    color:#ffffff;
    font-size:22px;
    font-weight:700;
}

.row b{
    color:#FFD700;
    font-size:24px;
    font-weight:800;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;

    height:72px;
    padding:0 20px;

    border-radius:22px;
    text-decoration:none;

    font-size:20px;
    font-weight:700;
    color:#fff;

    background:linear-gradient(135deg,#0f172a,#334155);

    border:1.5px solid rgba(255,255,255,.25);

    box-shadow:
        0 10px 25px rgba(0,0,0,.35),
        inset 0 2px 3px rgba(255,255,255,.30);

    transition:.35s ease;
}

.btn:hover{
    transform:translateY(-5px) scale(1.03);

    box-shadow:
        0 18px 35px rgba(0,0,0,.45),
        0 0 18px rgba(30,107,255,.45);
}

.btn:active{
    transform:scale(.98);
    }

.logout{
    grid-column:1/3;

    height:74px;

    background:linear-gradient(135deg,#dc2626,#991b1b);

    font-size:21px;
    font-weight:800;

    border-radius:22px;
    }
    .button-grid{
    width:100%;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:22px;
    margin-top:620px;
    padding-bottom:30px;
    }

.time-card{
    width:240px;
    height:80px;
    display:flex;
    flex-direction:column;
    justify-content:center;
    align-items:center;
    background:rgba(0,0,0,.75);
    backdrop-filter:blur(18px);
    border:1px solid rgba(255,255,255,.25);
    border-radius:18px;
    box-shadow:0 10px 25px rgba(0,0,0,.30);
    }
#digitalClock{
    font-size:32px;
    font-weight:700;
    color:#fff;
    letter-spacing:2px;
}

#liveDate{
    display:block;
    font-size:14px;
    color:#FFD700;
    margin-top:4px;
    }
    .top-profile{
    display:flex;
    justify-content:center;
    align-items:center;
    gap:20px;
    margin-bottom:15px;
    }
    .footer{
    width:100%;
    background:linear-gradient(90deg,#0b3d91,#1565c0,#0b3d91);
    color:#FFD700;
    text-align:center;
    padding:22px 10px;
    font-size:26px;
    font-weight:900;
    letter-spacing:3px;
    text-transform:uppercase;
    border-top:4px solid #FFD700;
    box-shadow:0 -6px 20px rgba(0,0,0,.35);
    text-shadow:0 0 10px rgba(255,215,0,.8);
    animation:footerGlow 2s infinite alternate;
}

@keyframes footerGlow{
    from{
        text-shadow:0 0 8px #FFD700;
    }
    to{
        text-shadow:0 0 20px #FFD700,0 0 35px #FFD700;
    }
    }
</style>

</head>

<body>
<div class="header">
    <h1>🎓 IPS PUBLIC SCHOOL</h1>
    <p>STUDENT DASHBOARD</p>
</div>

<div class="container">
    <div class="profile-card">

    <div class="top-profile">

    <div class="school-logo">
        <img src="logo.png" id="schoolLogo" alt="IPS Logo">
    </div>

    </div>

</div>

<h2 class="student-name" id="name">Student Name</h2>
<div class="info-card">

<div class="row">
<span>👨 Father</span>
<b id="father">Father Name</b>
</div>

<div class="row">
<span>🎓 Class</span>
<b id="class">7</b>
</div>

<div class="row">
<span>🎫 Roll No</span>
<b id="roll">2026</b>
</div>

</div>

</div>

<div class="button-grid">

<a class="btn" href="student-homework.html">📚 Homework</a>

<a class="btn" href="student-timetable.html">📅 Time Table</a>

<a class="btn" href="student-admitcard.html">🎫 Admit Card</a>

<a class="btn" href="index.html">📊 Result</a>

<a class="btn logout" href="student-login.html">🚪 Logout</a>

</div>
    <div class="time-card">
    <div id="digitalClock"></div>
    <div id="liveDate"></div>
    </div>
    </div>
    <script>
const digitalClock = document.getElementById("digitalClock");
const liveDate = document.getElementById("liveDate");

function updateClock(){

    const now = new Date();

    digitalClock.innerHTML = now.toLocaleTimeString("en-IN",{
        hour:"2-digit",
        minute:"2-digit",
        second:"2-digit",
        hour12:true
    });

    liveDate.innerHTML = now.toLocaleDateString("en-IN",{
        weekday:"short",
        day:"2-digit",
        month:"long",
        year:"numeric"
    });

}

updateClock();
setInterval(updateClock,1000);
    </script>
    <footer class="footer">
🏫 WELCOME TO IPS PUBLIC SCHOOL 🏫
    </footer>
</body>

</html>
