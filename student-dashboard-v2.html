<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPS Student Dashboard V2</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
    linear-gradient(rgba(4,25,70,.45),rgba(4,25,70,.60)),
    url("images/village-background.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.header{
    width:100%;
    padding:18px;
    text-align:center;
    background:linear-gradient(90deg,#003b8e,#0066ff);
    color:#fff;
    box-shadow:0 6px 20px rgba(0,0,0,.30);
}

.header h1{
    font-size:28px;
    font-weight:700;
}

.header p{
    margin-top:6px;
    font-size:15px;
    letter-spacing:2px;
  }
.container{
    width:100%;
    max-width:100%;
    padding:15px;
}

.profile-card{
    width:100%;
    margin:20px 0;
    padding:30px 20px;

    background:rgba(255,255,255,.20);
    backdrop-filter:blur(20px);

    border-radius:28px;

    border:2px solid rgba(255,255,255,.25);

    box-shadow:
    0 15px 40px rgba(0,0,0,.35),
    inset 0 1px 0 rgba(255,255,255,.25);
    }

.school-logo{
    width:130px;
    height:130px;
    margin:0 auto 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
    border:5px solid #FFD700;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 25px rgba(255,215,0,.6);
    }

.school-logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.student-name{
    text-align:center;
    color:#fff;
    font-size:30px;
    font-weight:700;
    margin-bottom:20px;
}

.student-class{
    color:#fff;
    opacity:.9;
    margin-top:8px;
  }
    .info-card{
    display:grid;
    gap:15px;
    margin-top:25px;
}

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:16px 18px;

    background:rgba(255,255,255,.12);

    border-radius:16px;

    color:#fff;

    font-size:18px;

    border:1px solid rgba(255,255,255,.18);
}

.row b{
    color:#FFD700;
    }
    .button-grid{
    width:100%;
    display:grid;
    grid-template-columns:1fr 1fr;
    gap:15px;
    margin-top:20px;
        }

.btn{
    display:flex;
    align-items:center;
    justify-content:center;

    width:100%;
    height:60px;

    background:linear-gradient(135deg,#0b3d91,#2f80ff);

    color:#fff;
    text-decoration:none;

    font-size:18px;
    font-weight:700;

    border-radius:16px;

    border:1px solid rgba(255,255,255,.25);

    box-shadow:
    0 10px 25px rgba(0,0,0,.30),
    inset 0 1px 1px rgba(255,255,255,.30);

    transition:.35s;
}
.btn:hover{
    transform:translateY(-4px) scale(1.02);
}

.btn:active{
    transform:scale(.97);
}
.logout{
    grid-column:1/3;
    background:linear-gradient(135deg,#c62828,#ff5252);
}
</style>

</head>

<body>
<div class="header">
    <h1>🎓 IPS PUBLIC SCHOOL</h1>
    <p>STUDENT DASHBOARD</p>
</div>

<div class="container">

    <div class="profile-card">

        <div class="school-logo">
        <img src="logo.png" id="schoolLogo" alt="IPS Logo">
        </div>

        <h2 class="student-name" id="name">
            Student Name
        </h2>
<div class="info-card">

<div class="row">
<span>👨 Father</span>
<b id="father">Father Name</b>
</div>

<div class="row">
<span>🎓 Class</span>
<b id="class">7</b>
</div>

<div class="row">
<span>🎫 Roll No</span>
<b id="roll">2026</b>
</div>

</div>

</div>
    <div class="button-grid">

<a class="btn" href="student-homework.html">📚 Homework</a>

<a class="btn" href="student-timetable.html">📅 Time Table</a>

<a class="btn" href="student-admitcard.html">🎫 Admit Card</a>

<a class="btn" href="index.html">📊 Result</a>

<a class="btn logout" href="student-login.html">🚪 Logout</a>

    </div>
</body>

</html>
