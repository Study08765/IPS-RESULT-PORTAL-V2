<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IPS Student Dashboard V2</title>

<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;500;600;700&display=swap" rel="stylesheet">

<style>

*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:'Poppins',sans-serif;
}

body{
    min-height:100vh;
    background:
        linear-gradient(rgba(4,25,70,.45), rgba(4,25,70,.60)),
        url("village-bg.jpg");
    background-size:cover;
    background-position:center;
    background-repeat:no-repeat;
    background-attachment:fixed;
}

.header{
    width:100%;
    padding:18px;
    text-align:center;
    background:linear-gradient(90deg,#003b8e,#0066ff);
    color:#fff;
    box-shadow:0 6px 20px rgba(0,0,0,.30);
}

.header h1{
    font-size:28px;
    font-weight:700;
}

.header p{
    margin-top:6px;
    font-size:15px;
    letter-spacing:2px;
  }
.container{
    width:100%;
    max-width:100%;
    padding:15px;
}

.profile-card{
    width:100%;
    padding:30px 22px;
    margin:20px 0;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,.22),
        rgba(255,255,255,.08)
    );

    backdrop-filter:blur(25px);

    border:1.5px solid rgba(255,255,255,.28);
    border-radius:30px;

    box-shadow:
        0 15px 40px rgba(0,0,0,.35),
        inset 0 1px 0 rgba(255,255,255,.30);

    transition:.3s;
}

.profile-card:hover{
    transform:translateY(-4px);
    box-shadow:
        0 20px 50px rgba(0,0,0,.40),
        inset 0 1px 0 rgba(255,255,255,.35);
}

.school-logo{
    width:130px;
    height:130px;
    margin:0 auto 20px;
    display:flex;
    justify-content:center;
    align-items:center;
    background:#fff;
    border:5px solid #FFD700;
    border-radius:50%;
    overflow:hidden;
    box-shadow:0 0 25px rgba(255,215,0,.6);
    }

.school-logo img{
    width:100%;
    height:100%;
    object-fit:contain;
}

.student-name{
    color:#fff;
    font-size:32px;
    font-weight:800;
    margin:18px 0;
    text-align:center;
    text-shadow:0 4px 12px rgba(0,0,0,.45);
}

.student-class{
    color:#fff;
    opacity:.9;
    margin-top:8px;
  }
    .info-card{
    display:grid;
    gap:18px;
    margin-top:28px;
    }

.row{
    display:flex;
    justify-content:space-between;
    align-items:center;

    padding:18px 22px;
    margin-bottom:16px;

    background:linear-gradient(
        135deg,
        rgba(255,255,255,.22),
        rgba(255,255,255,.10)
    );

    border:1.5px solid rgba(255,255,255,.30);
    border-radius:18px;

    backdrop-filter:blur(15px);

    box-shadow:
        0 8px 20px rgba(0,0,0,.25),
        inset 0 1px 0 rgba(255,255,255,.35);

    transition:.3s;
}

.row:hover{
    transform:translateY(-3px);
    box-shadow:0 15px 30px rgba(0,0,0,.35);
}

.row span{
    color:#ffffff;
    font-size:17px;
    font-weight:600;
}

.row b{
    color:#FFD700;
    font-size:18px;
    font-weight:700;
}

.btn{
    display:flex;
    align-items:center;
    justify-content:center;

    height:72px;
    padding:0 20px;

    border-radius:22px;
    text-decoration:none;

    font-size:20px;
    font-weight:700;
    color:#fff;

    background:linear-gradient(135deg,#1e6bff,#003fbd);

    border:1.5px solid rgba(255,255,255,.25);

    box-shadow:
        0 10px 25px rgba(0,0,0,.35),
        inset 0 2px 3px rgba(255,255,255,.30);

    transition:.35s ease;
}

.btn:hover{
    transform:translateY(-5px) scale(1.03);

    box-shadow:
        0 18px 35px rgba(0,0,0,.45),
        0 0 18px rgba(30,107,255,.45);
}

.btn:active{
    transform:scale(.98);
    }

.logout{
    grid-column:1/3;

    height:74px;

    background:linear-gradient(135deg,#ff4d4d,#d60000);

    font-size:21px;
    font-weight:800;

    border-radius:22px;
    }
    .button-grid{
    width:100%;
    display:grid;
    grid-template-columns:repeat(2,1fr);
    gap:22px;
    margin-top:30px;
    }
/* ===== PREMIUM ANALOG CLOCK ===== */

.time-card{
    width:100%;
    max-width:360px;
    margin:25px auto;
    padding:20px;
    text-align:center;
    border-radius:25px;
    background:rgba(255,255,255,.15);
    backdrop-filter:blur(15px);
    box-shadow:0 10px 30px rgba(0,0,0,.35);
}

.time-card h2{
    color:#fff;
    margin-bottom:15px;
    letter-spacing:2px;
}

.clock{
    width:260px;
    height:260px;
    margin:auto;
    border:8px solid #ffffff;
    border-radius:50%;
    position:relative;
    background:radial-gradient(circle,#ffffff22,#00000022);
    box-shadow:
    inset 0 0 20px rgba(255,255,255,.3),
    0 0 25px rgba(0,150,255,.4);
}

.number{
    position:absolute;
    width:30px;
    height:30px;
    color:#fff;
    font-size:20px;
    font-weight:bold;
    text-align:center;
    line-height:30px;
    transform:translate(-50%,-50%);
}

.n12{top:8%;left:50%;}
.n1{top:14%;left:69%;}
.n2{top:28%;left:84%;}
.n3{top:50%;left:92%;}
.n4{top:72%;left:84%;}
.n5{top:86%;left:69%;}
.n6{top:92%;left:50%;}
.n7{top:86%;left:31%;}
.n8{top:72%;left:16%;}
.n9{top:50%;left:8%;}
.n10{top:28%;left:16%;}
.n11{top:14%;left:31%;}

.hour,
.minute,
.second{
    position:absolute;
    left:50%;
    bottom:50%;
    transform-origin:bottom;
    transform:translateX(-50%) rotate(0deg);
    border-radius:10px;
}

.hour{
    width:8px;
    height:65px;
    background:#ffffff;
}

.minute{
    width:5px;
    height:90px;
    background:#00e5ff;
}

.second{
    width:2px;
    height:105px;
    background:red;
}

.center-dot{
    width:16px;
    height:16px;
    background:#fff;
    border-radius:50%;
    position:absolute;
    top:50%;
    left:50%;
    transform:translate(-50%,-50%);
    box-shadow:0 0 10px #fff;
}

#liveDate{
    margin-top:18px;
    color:#fff;
    font-size:18px;
    font-weight:bold;
     }
</style>

</head>

<body>
<div class="header">
    <h1>🎓 IPS PUBLIC SCHOOL</h1>
    <p>STUDENT DASHBOARD</p>
</div>

<div class="container">

    <div class="profile-card">

        <div class="school-logo">
        <img src="logo.png" id="schoolLogo" alt="IPS Logo">
        </div>

        <h2 class="student-name" id="name">
            Student Name
        </h2>
<div class="info-card">

<div class="row">
<span>👨 Father</span>
<b id="father">Father Name</b>
</div>

<div class="row">
<span>🎓 Class</span>
<b id="class">7</b>
</div>

<div class="row">
<span>🎫 Roll No</span>
<b id="roll">2026</b>
</div>

</div>

</div>
    <div class="button-grid">

<a class="btn" href="student-homework.html">📚 Homework</a>

<a class="btn" href="student-timetable.html">📅 Time Table</a>

<a class="btn" href="student-admitcard.html">🎫 Admit Card</a>

<a class="btn" href="index.html">📊 Result</a>

<a class="btn logout" href="student-login.html">🚪 Logout</a>

    </div>
    <div class="time-card">

    <h2>🕒 LIVE CLOCK</h2>

    <div class="clock">

        <div class="number n1">1</div>
        <div class="number n2">2</div>
        <div class="number n3">3</div>
        <div class="number n4">4</div>
        <div class="number n5">5</div>
        <div class="number n6">6</div>
        <div class="number n7">7</div>
        <div class="number n8">8</div>
        <div class="number n9">9</div>
        <div class="number n10">10</div>
        <div class="number n11">11</div>
        <div class="number n12">12</div>

        <div class="hour"></div>
        <div class="minute"></div>
        <div class="second"></div>

        <div class="center-dot"></div>

    </div>

    <div id="liveDate"></div>

    </div>
    <script>
const hour = document.querySelector(".hour");
const minute = document.querySelector(".minute");
const second = document.querySelector(".second");
const liveDate = document.getElementById("liveDate");

function updateClock(){

    const now = new Date();

    const hr = now.getHours() % 12;
    const min = now.getMinutes();
    const sec = now.getSeconds();

    const hourDeg = hr * 30 + min * 0.5;
    const minuteDeg = min * 6 + sec * 0.1;
    const secondDeg = sec * 6;

    hour.style.transform =
        `translateX(-50%) rotate(${hourDeg}deg)`;

    minute.style.transform =
        `translateX(-50%) rotate(${minuteDeg}deg)`;

    second.style.transform =
        `translateX(-50%) rotate(${secondDeg}deg)`;

    liveDate.innerHTML =
        now.toLocaleDateString("en-IN",{
            weekday:"long",
            day:"numeric",
            month:"long",
            year:"numeric"
        });

}

updateClock();
setInterval(updateClock,1000);
    </script>
</body>

</html>
