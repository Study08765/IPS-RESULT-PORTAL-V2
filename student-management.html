<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Management</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6fb;
}

.header{
background:#0b3d91;
color:#fff;
padding:18px;
font-size:24px;
font-weight:bold;
text-align:center;
}

.container{
max-width:1000px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

h2{
color:#0b3d91;
margin-bottom:20px;
}

.grid{
display:grid;
grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
gap:15px;
}

input,select{
padding:12px;
border:1px solid #ccc;
border-radius:8px;
width:100%;
box-sizing:border-box;
}

button{
margin-top:20px;
padding:14px;
width:100%;
border:none;
border-radius:14px;
font-size:16px;
font-weight:bold;
cursor:pointer;
color:#fff;
background:linear-gradient(135deg,#0b3d91,#1d5fd3);
box-shadow:0 8px 20px rgba(11,61,145,.35);
transition:.3s;
}

button:hover{
transform:translateY(-3px);
background:linear-gradient(135deg,#1d5fd3,#0b3d91);
box-shadow:0 12px 25px rgba(11,61,145,.45);
}

button:active{
transform:scale(.97);
}

#saveBtn{
background:linear-gradient(135deg,#16a34a,#22c55e);
}

table{
width:100%;
margin-top:30px;
border-collapse:collapse;
}

th,td{
padding:12px;
border:1px solid #ddd;
text-align:center;
}

th{
background:#0b3d91;
color:white;
}
</style>
</head>

<body>

<div class="header">
🎓 Student Management
</div>

<div class="container">

<h2>Add Student</h2>
<div style="display:grid;grid-template-columns:repeat(auto-fit,minmax(180px,1fr));gap:10px;margin-bottom:20px;">

<button onclick="location.href='viewstudents_v2.html'">👨‍🎓 View Students</button>


<button onclick="location.href='homework.html'">📖 Homework</button>

<button onclick="location.href='timetable-management.html'">
🗓️ Time Table
</button>
<button onclick="location.href='admitcard.html'">🎫 Admit Card</button>
<button onclick="location.href='exam-schedule.html'">
📅 Exam Schedule
</button>
<button onclick="location.href='dashboard.html'">🏠 Dashboard</button>

</div>
<div class="grid">

<div style="margin-top:20px">

<button onclick="location.href='addstudent_v2.html'">
➕ Add / Edit Student
</button>

</div>

</div>

<button id="saveBtn">Save Student</button>

<table>

<thead>

<tr>

</thead>

<tbody id="studentTable">

</tbody>

</table>

</div>



</body>
  </html>
