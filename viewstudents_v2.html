<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>View Students V2</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6fb;
padding:20px;
}

.box{
max-width:1000px;
margin:auto;
background:white;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px #ccc;
}

h2{
text-align:center;
color:#0b3d91;
}

input{
width:100%;
padding:10px;
margin:15px 0;
font-size:16px;
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th,td{
border:1px solid #ddd;
padding:10px;
text-align:center;
}

th{
background:#0b3d91;
color:white;
}

button{
padding:8px 15px;
border:none;
border-radius:5px;
cursor:pointer;
color:white;
}

.edit{
background:#28a745;
}

.delete{
background:#dc3545;
}
</style>

</head>

<body>

<div class="box">

<h2>All Students (V2)</h2>

<input type="text" id="search" placeholder="Search by Roll or Name">

<table>

<thead>
<tr>
<th>Roll</th>
<th>Name</th>
<th>Class</th>
<th>Exam</th>
<th>Session</th>
<th>Action</th>
</tr>
</thead>

<tbody id="students">

</tbody>

</table>

</div>

<script type="module" src="view_v2.js"></script>

</body>
</html>
