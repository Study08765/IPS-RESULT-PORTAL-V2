<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Admit Card</title>

<style>
body{
margin:0;
font-family:Arial,sans-serif;
background:#f4f6fb;
}

.header{
background:#0b3d91;
color:white;
padding:18px;
text-align:center;
font-size:24px;
font-weight:bold;
}

.container{
max-width:800px;
margin:20px auto;
background:white;
padding:20px;
border-radius:12px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
text-align:center;
}

.card{
background:#eef5ff;
padding:20px;
border-radius:10px;
margin-top:20px;
}

.back{
display:block;
margin-top:20px;
background:#0b3d91;
color:white;
padding:12px;
text-decoration:none;
border-radius:8px;
}
  .card{
background:#fff;
border:2px solid #0b3d91;
border-radius:12px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
}

table{
width:100%;
border-collapse:collapse;
margin-top:15px;
}

th{
background:#0b3d91;
color:#fff;
padding:10px;
}

td{
padding:8px;
text-align:center;
border:1px solid #ccc;
}

#admitBox h2{
color:#0b3d91;
margin-bottom:5px;
}

#admitBox h3{
margin-bottom:15px;
}

#admitBox p{
margin:8px 0;
font-size:16px;
}

#admitBox button{
width:100%;
margin-top:20px;
padding:12px;
background:#0b3d91;
color:white;
border:none;
border-radius:8px;
font-size:16px;
cursor:pointer;
  }
</style>
</head>

<body>

<div class="header">
🎫 Admit Card
</div>

<div class="container">

<div id="admitBox"></div>

<script type="module" src="student-admit.js"></script>

<a href="student-dashboard.html" class="back">
⬅ Back to Dashboard
</a>

</div>

</body>
</html>
