<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Staff Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
}

.header{
background:#0b3d91;
color:#fff;
text-align:center;
padding:20px;
}

.header h2{
margin-bottom:8px;
}

.header h3{
margin:5px 0;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

.card{
background:#fff;
padding:18px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

.card h3{
margin-bottom:10px;
color:#0b3d91;
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#0b3d91;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}

button:hover{
background:#082d69;
}
</style>
</head>

<body>

<div class="header">

<h2>👨‍🏫 School Staff Dashboard</h2>

<h3 id="staffName">Welcome Staff</h3>

<p id="staffClass">Assigned Class : Loading...</p>

</div>

<div class="container">

<div class="card">
<h3>👥 My Students</h3>
<button onclick="location.href='my-students.html'">
Open My Students
</button>
</div>

<div class="card">
<h3>➕ Add Student</h3>
<button onclick="location.href='addstudent.html'">
Add Student
</button>
</div>

<div class="card">
<h3>📊 Create Result</h3>
<button>Create Result</button>
</div>

<div class="card">
<h3>✏️ Edit Result</h3>
<button>Edit Result</button>
</div>

<div class="card">
<h3>🚪 Logout</h3>
<button onclick="logout()">Logout</button>
</div>

</div>

<script>
function logout(){
localStorage.removeItem("staffLogin");
location.href="staff-login.html";
}
</script>

<script type="module" src="staff-dashboard.js"></script>

</body>
</html>
