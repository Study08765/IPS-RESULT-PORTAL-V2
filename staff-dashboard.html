<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>School Staff Dashboard</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6fb;
margin:0;
}

.header{
background:#0b3d91;
color:white;
padding:18px;
text-align:center;
}

.container{
max-width:900px;
margin:20px auto;
padding:15px;
}

.card{
background:white;
padding:18px;
margin-bottom:15px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.15);
}

button{
width:100%;
padding:12px;
margin-top:10px;
background:#0b3d91;
color:white;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}
</style>
</head>

<body>

<div class="header">
<h2>👨‍🏫 School Staff Dashboard</h2>
</div>

<div class="container">

<div class="card">
<h3>👥 Student List</h3>
<button>Open Student List</button>
</div>

<div class="card">
<h3>📊 Create Result</h3>
<button>Create Result</button>
</div>

<div class="card">
<h3>✏️ Edit Result</h3>
<button>Edit Result</button>
</div>

<div class="card">
<h3>🚪 Logout</h3>
<button onclick="logout()">Logout</button>
</div>

</div>

<script>
function logout(){
localStorage.removeItem("staffLogin");
location.href="staff-login.html";
}
</script>

</body>
</html>
