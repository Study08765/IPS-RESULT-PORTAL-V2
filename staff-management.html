<!DOCTYPE html>
<html>
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Staff Management</title>

<style>
body{
font-family:Arial,sans-serif;
background:#f4f6fb;
padding:20px;
}

.box{
max-width:500px;
margin:auto;
background:#fff;
padding:20px;
border-radius:10px;
box-shadow:0 0 10px rgba(0,0,0,.2);
}

input,select{
width:100%;
padding:12px;
margin-top:12px;
}

button{
width:100%;
padding:12px;
margin-top:15px;
background:#0b3d91;
color:#fff;
border:none;
border-radius:6px;
font-size:16px;
cursor:pointer;
}
  #addStaffBox{
display:none;
  }
</style>
</head>

<body>

<div class="box">

<h2 align="center">👨‍🏫 Staff Management</h2>

<div style="display:grid;grid-template-columns:1fr 1fr;gap:15px;margin:20px 0;">

<button onclick="location.href='viewstaff.html'"
style="background:#198754;height:80px;font-size:18px;">
👀<br>View Staff
</button>

<button onclick="showAddStaff()">
style="background:#0b3d91;height:80px;font-size:18px;">
➕<br>Add Staff
</button>

</div>

<div id="addStaffBox">

<input id="staffId" placeholder="Staff ID">

<input id="staffName" placeholder="Staff Name">

<input id="mobile" placeholder="Mobile Number">

<input id="password" placeholder="Password">

<select id="staffClass">
<option value="">Select Class</option>
<option>Play Group</option>
<option>Nursery</option>
<option>LKG</option>
<option>UKG</option>
<option>1</option>
<option>2</option>
<option>3</option>
<option>4</option>
<option>5</option>
<option>6</option>
<option>7</option>
<option>8</option>
</select>

<button onclick="saveStaff()">
💾 Save Staff
</button>

</div>

</div>

<script type="module" src="staff-management.js"></script>
<script>
function showAddStaff(){
document.getElementById("addStaffBox").style.display="block";
}
</script>
</body>
</html>
