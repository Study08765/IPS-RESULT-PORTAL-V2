<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Student Dashboard</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
}

.header{
background:#0b3d91;
color:white;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.card{
max-width:420px;
margin:20px auto;
background:white;
border-radius:12px;
padding:20px;
box-shadow:0 5px 15px rgba(0,0,0,.15);
text-align:center;
}

#name{
font-size:22px;
font-weight:bold;
color:#0b3d91;
margin-top:10px;
}

.info{
margin-top:10px;
font-size:17px;
}

.grid{
max-width:420px;
margin:15px auto;
display:grid;
grid-template-columns:1fr 1fr;
gap:15px;
}

.btn{
background:#0b3d91;
color:white;
padding:18px;
border-radius:10px;
text-align:center;
font-size:18px;
text-decoration:none;
font-weight:bold;
}

.logout{
background:#d32f2f;
}
</style>

</head>

<body>

<div class="header">
🎓 IPS STUDENT PORTAL
</div>

<div class="card">

<h2 id="name"></h2>

<div class="info">
Class : <span id="class"></span>
</div>

<div class="info">
Roll No : <span id="roll"></span>
</div>

</div>

<div class="grid">

<a class="btn" href="#">📚 Homework</a>

<a class="btn" href="#">📅 Time Table</a>

<a class="btn" href="#">🎫 Admit Card</a>

<a class="btn" href="#">📊 Result</a>

<a class="btn logout" href="student-login.html">🚪 Logout</a>

</div>

<script>

const student=JSON.parse(localStorage.getItem("student"));

if(!student){

window.location="student-login.html";

}

document.getElementById("name").innerHTML=student.name;

document.getElementById("class").innerHTML=student.class;

document.getElementById("roll").innerHTML=student.roll;

</script>

</body>
</html>
