<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Attendance</title>

<style>
*{
margin:0;
padding:0;
box-sizing:border-box;
font-family:Arial,sans-serif;
}

body{
background:#f4f6fb;
}

.header{
background:#0b3d91;
color:#fff;
padding:18px;
text-align:center;
font-size:22px;
font-weight:bold;
}

.card{
width:95%;
max-width:420px;
margin:20px auto;
background:#fff;
padding:20px;
border-radius:12px;
box-shadow:0 5px 12px rgba(0,0,0,.15);
}

.card h2{
text-align:center;
color:#0b3d91;
margin-bottom:20px;
}

.row{
display:flex;
justify-content:space-between;
padding:12px;
margin:10px 0;
border-radius:8px;
font-size:18px;
font-weight:bold;
}

.present{
background:#d4edda;
color:#155724;
}

.absent{
background:#f8d7da;
color:#721c24;
}

.total{
background:#fff3cd;
color:#856404;
}

.percent{
background:#d1ecf1;
color:#0c5460;
}

.back{
display:block;
width:220px;
margin:25px auto;
padding:12px;
background:#0b3d91;
color:#fff;
text-align:center;
text-decoration:none;
border-radius:10px;
font-size:18px;
font-weight:bold;
}
</style>

</head>
<body>

<div class="header">
📅 Student Attendance
</div>

<div class="card">

<h2 id="studentName">Loading...</h2>

<div class="row total">
<span>Total Working Days</span>
<span>50</span>
</div>

<div class="row present">
<span>Present</span>
<span>48</span>
</div>

<div class="row absent">
<span>Absent</span>
<span>2</span>
</div>

<div class="row percent">
<span>Attendance</span>
<span>96%</span>
</div>

</div>

<a href="student-dashboard.html" class="back">
⬅ Back to Dashboard
</a>

<script>
const student = JSON.parse(localStorage.getItem("student"));

if(student){
document.getElementById("studentName").innerHTML = student.name;
}else{
window.location="student-login.html";
}
</script>

</body>
  </html>
